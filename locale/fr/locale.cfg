flo-enable-storage-tanks=Activer les réservoirs de stockage
flo-enable-fluid-wagons=Activer les wagons-citernes
flo-enable-production-machines=Activer les machines de production
flo-enable-pumps=Activer les pompes
flo-enable-other-entities=Activer les autres entités à fluides
