flo-damage-power=Ajustement des dégâts d'explosion
flo-min-energy-mj=Énergie minimale d'explosion (MJ)
flo-default-energy-mj=Énergie de fluide par défaut (MJ par unité)
flo-pollution-mult=Multiplicateur de pollution
flo-fire-spread-mult=Intensité de propagation du feu
flo-ignition-delay-seconds=Délai d'ignition (secondes)
flo-max-explosions-per-tick=Explosions maximales par tick
