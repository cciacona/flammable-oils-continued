[mod-name]
flammable-oils-continued=Flammable Oils Continued

[mod-description]
flammable-oils-continued=Les entités manipulant des fluides peuvent prendre feu et exploser selon leur contenu. Ajoute des réglages d'ignition et des feux facultatifs pour les objets combustibles sur les convoyeurs, au sol et dans les cargaisons détruites.

[entity-name]
oil-fire-flame=Feu de pétrole
flammable-item-fire-flame=Objets en feu

