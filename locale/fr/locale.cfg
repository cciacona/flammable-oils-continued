[mod-setting-description]
flo-radius-mult=Multiplie le rayon d'explosion calculé. La valeur par défaut du mod original est 0,1.
flo-radius-power=Contrôle l'ajustement du rayon selon l'énergie stockée. Une valeur de 2 utilise la racine carrée de l'énergie ; la valeur originale est 2,5.
flo-damage-mult=Multiplie les dégâts d'explosion calculés. La valeur par défaut du mod original est 5.
flo-damage-power=Contrôle l'ajustement des dégâts selon l'énergie stockée. Une valeur de 2 utilise la racine carrée de l'énergie ; la valeur originale est 2,5.
flo-min-energy-mj=Une entité explose seulement si l'énergie combinée de ses fluides inflammables dépasse cette valeur. L'ancien seuil fixe était de 10 MJ.
flo-default-energy-mj=Énergie utilisée pour un fluide explicitement inflammable sans valeur énergétique ni valeur spécifique. La valeur par défaut de 0,45 MJ par unité correspond au gaz de pétrole et au pétrole lourd.
flo-pollution-mult=Multiplie la pollution produite par les explosions de fluides. 0 la désactive et 1 conserve la quantité originale.
flo-fire-spread-mult=Multiplie le nombre de feux de pétrole créés. 0 les désactive et 1 conserve l'intensité originale.
flo-ignition-delay-seconds=Délai entre la destruction et l'explosion. La fumée signale une rupture retardée afin de laisser le temps de s'éloigner ou d'isoler les installations voisines. 0 conserve la réaction presque immédiate.
flo-max-explosions-per-tick=Limite le travail d'une réaction en chaîne pendant un tick. Les explosions excédentaires restent en attente. Une valeur plus basse protège les performances mais ralentit les réactions très importantes.
flo-chance-fire=Probabilité qu'un coup fatal infligeant des dégâts de feu enflamme le contenu. L'ancienne valeur fixe était de 95 %.
flo-chance-explosion=Probabilité qu'un coup fatal infligeant des dégâts d'explosion enflamme le contenu. L'ancienne valeur fixe était de 75 %.
flo-chance-acid=Probabilité qu'un coup fatal infligeant des dégâts d'acide enflamme le contenu. L'ancienne valeur fixe était de 50 %.
flo-chance-electric=Probabilité qu'un coup fatal infligeant des dégâts électriques enflamme le contenu. L'ancienne valeur fixe était de 50 %.
flo-chance-laser=Probabilité qu'un coup fatal infligeant des dégâts de laser enflamme le contenu. L'ancienne valeur fixe était de 50 %.
flo-chance-physical=Probabilité qu'un coup fatal infligeant des dégâts physiques enflamme le contenu. Le comportement original était de 0 %.
flo-chance-impact=Probabilité qu'un coup fatal infligeant des dégâts d'impact enflamme le contenu. Le comportement original était de 0 %.
flo-chance-poison=Probabilité qu'un coup fatal infligeant des dégâts de poison enflamme le contenu. Le comportement original était de 0 %.
flo-chance-other=Probabilité utilisée pour les types de dégâts moddés ou non répertoriés. Le comportement original était de 0 %.
flo-fluid-whitelist=Liste facultative des noms exacts de prototypes de fluide, séparés par des virgules, espaces ou points-virgules. Si elle n'est pas vide, seuls les fluides indiqués sont inflammables. La liste noire reste prioritaire.
flo-fluid-blacklist=Liste facultative des noms exacts de prototypes de fluide, séparés par des virgules, espaces ou points-virgules. Ces fluides ne s'enflamment jamais. Cette liste est prioritaire sur la détection automatique et la liste blanche.
flo-enable-pipes=Permet aux tuyaux et tuyaux souterrains de s'enflammer.
flo-enable-storage-tanks=Permet aux réservoirs de stockage de s'enflammer.
flo-enable-fluid-wagons=Permet aux wagons-citernes de s'enflammer.
flo-enable-production-machines=Permet aux raffineries, usines chimiques, machines d'assemblage, fours, chaudières, générateurs, foreuses, réacteurs, laboratoires et silos à fusée de s'enflammer.
flo-enable-pumps=Permet aux pompes et pompes côtières de s'enflammer. Désactivé par défaut afin de conserver l'exception originale.
flo-enable-other-entities=Permet aux autres types d'entités manipulant des fluides de s'enflammer.
flo-enable-solid-items=Interrupteur général pour le bois, le charbon, le combustible solide, le carburant pour fusée, les tonneaux de fluide pleins et les munitions de lance-flammes. Désactivé par défaut afin que les sauvegardes existantes conservent leur comportement précédent.
flo-solid-items-on-belts=Permet au feu proche de consumer les objets pris en charge à leur position réelle sur les convoyeurs, entrées souterraines, répartiteurs, chargeurs et convoyeurs liés.
flo-solid-items-on-ground=Permet au feu proche de consumer les piles d'objets prises en charge déposées au sol.
flo-solid-items-in-containers=Enflamme le contenu pris en charge lorsqu'un coffre, coffre logistique, conteneur lié ou wagon de marchandises est détruit. Les inventaires de combustible ne sont jamais analysés.
flo-enable-wood-fires=Le bois s'enflamme facilement et brûle rapidement avec une pollution et une fumée modérées.
flo-enable-coal-fires=Le charbon peut s'enflammer dans un feu établi, mais brûle plus lentement et pollue davantage que le bois.
flo-enable-solid-fuel-fires=Le combustible solide brûle comme un feu de pétrole intense sans détoner comme le carburant pour fusée.
flo-enable-rocket-fuel-fires=Le carburant pour fusée brûle violemment et peut provoquer des explosions destructrices.
flo-enable-filled-barrel-fires=Les tonneaux pleins héritent de l'inflammabilité, de l'énergie, des émissions et de la classification gazeuse du fluide contenu. Les tonneaux vides ne sont pas inflammables.
flo-enable-flamethrower-ammo-fires=Les munitions de lance-flammes produisent un feu de pétrole intense et une petite explosion.
flo-max-solid-updates-per-tick=Limite les recherches d'objets proches et les étapes de combustion pendant un tick. Le travail excédentaire reste en attente. Une valeur plus basse réduit le coût maximal des très grands incendies.
