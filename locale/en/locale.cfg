[mod-name]
flammable-oils-continued=Flammable Oils Continued

[mod-description]
flammable-oils-continued=Fluid-handling entities can catch fire and explode based on their contents. Adds configurable ignition behavior and optional combustible-item fires on belts, on the ground, and in destroyed cargo.

[entity-name]
oil-fire-flame=Oil fire
flammable-item-fire-flame=Burning items

