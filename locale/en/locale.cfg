[mod-setting-description]
flo-radius-mult=Multiplies the calculated explosion radius. The original mod default is 0.1.
flo-radius-power=Controls how radius scales with stored energy. A value of 2 uses the square root of energy; the original mod default is 2.5.
flo-damage-mult=Multiplies the calculated explosion damage. The original mod default is 5.
flo-damage-power=Controls how damage scales with stored energy. A value of 2 uses the square root of energy; the original mod default is 2.5.
flo-min-energy-mj=An entity only explodes when the combined energy of its flammable fluidboxes exceeds this value. The previous fixed threshold was 10 MJ.
flo-default-energy-mj=Energy used for an explicitly flammable fluid that has no prototype fuel value or specific override. The default, 0.45 MJ per unit, matches petroleum gas and heavy oil.
flo-pollution-mult=Multiplies pollution released by fluid explosions. 0 disables explosion pollution; 1 preserves the original amount.
flo-fire-spread-mult=Multiplies the number of oil fires created by an explosion. 0 disables new oil fires; 1 preserves the original intensity.
flo-ignition-delay-seconds=Delay between destruction and explosion. Smoke marks a delayed rupture, giving players time to move away or isolate nearby infrastructure. 0 preserves the original near-immediate reaction.
flo-max-explosions-per-tick=Limits chain-reaction work in one tick. Excess explosions remain queued for later ticks. Lower values improve worst-case performance but make very large reactions take longer.
flo-chance-fire=Chance that a killing blow using fire damage ignites flammable contents. The original fixed chance was 95%.
flo-chance-explosion=Chance that a killing blow using explosion damage ignites flammable contents. The original fixed chance was 75%.
flo-chance-acid=Chance that a killing blow using acid damage ignites flammable contents. The original fixed chance was 50%.
flo-chance-electric=Chance that a killing blow using electric damage ignites flammable contents. The original fixed chance was 50%.
flo-chance-laser=Chance that a killing blow using laser damage ignites flammable contents. The original fixed chance was 50%.
flo-chance-physical=Chance that a killing blow using physical damage ignites flammable contents. The original behavior was 0%.
flo-chance-impact=Chance that a killing blow using impact damage ignites flammable contents. The original behavior was 0%.
flo-chance-poison=Chance that a killing blow using poison damage ignites flammable contents. The original behavior was 0%.
flo-chance-other=Chance used for modded or otherwise unlisted damage types. The original behavior was 0%.
flo-fluid-whitelist=Optional list of exact fluid prototype names separated by commas, spaces, or semicolons. When non-empty, only listed fluids are considered flammable, even if automatically detected. The blacklist still takes priority.
flo-fluid-blacklist=Optional list of exact fluid prototype names separated by commas, spaces, or semicolons. Listed fluids never ignite. This takes priority over automatic detection and the whitelist.
flo-enable-pipes=Allows pipes and underground pipes to ignite.
flo-enable-storage-tanks=Allows storage tanks to ignite.
flo-enable-fluid-wagons=Allows fluid wagons to ignite.
flo-enable-production-machines=Allows refineries, chemical plants, assemblers, furnaces, boilers, generators, mining drills, reactors, labs, and rocket silos to ignite.
flo-enable-pumps=Allows pumps and offshore pumps to ignite. Disabled by default to preserve the original pump exception.
flo-enable-other-entities=Allows fluid-handling entity types not covered by the other category settings to ignite.
flo-enable-solid-items=Master switch for burning wood, coal, solid fuel, rocket fuel, filled fluid barrels, and flamethrower ammunition. Disabled by default so existing saves keep their previous behavior until explicitly enabled.
flo-solid-items-on-belts=Allows nearby fire to consume supported items at their actual positions on transport belts, underground belt entrances, splitters, loaders, and linked belts.
flo-solid-items-on-ground=Allows nearby fire to consume supported item stacks dropped on the ground.
flo-solid-items-in-containers=Ignites supported contents when a chest, logistic chest, linked container, or cargo wagon is destroyed. Burner fuel inventories are never scanned.
flo-enable-wood-fires=Wood catches readily and burns quickly with modest smoke and pollution.
flo-enable-coal-fires=Coal can ignite in an established fire, but burns more slowly and produces more pollution than wood.
flo-enable-solid-fuel-fires=Solid fuel burns as a hot petroleum fire without detonating like rocket fuel.
flo-enable-rocket-fuel-fires=Rocket fuel burns violently and can cause damaging explosions.
flo-enable-filled-barrel-fires=Filled barrels inherit the flammability, energy, emissions, and gas classification of their contained fluid. Empty barrels are not flammable.
flo-enable-flamethrower-ammo-fires=Flamethrower ammunition produces an intense petroleum fire and a small explosion.
flo-max-solid-updates-per-tick=Limits nearby-item scans and burn steps in one tick. Excess work remains queued. Lower values reduce the worst-case cost of very large fires.
